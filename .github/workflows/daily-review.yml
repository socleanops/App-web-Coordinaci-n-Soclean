name: Daily Code Review and E2E Tests

on:
  schedule:
    # 23:00 Uruguay Time is 02:00 UTC next day
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  test-and-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: Run Unit Tests
        run: npx vitest run

      - name: Build Project
        run: npm run build

      # Optional: In the future, you can add Playwright or Cypress here to test the live site at https://app.soclean.business
      # - name: Run E2E Tests on Live Site
      #   run: npx playwright test --config=playwright.config.ts
      #   env:
      #     BASE_URL: https://app.soclean.business
