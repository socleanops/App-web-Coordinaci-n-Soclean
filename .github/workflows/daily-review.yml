name: Daily Review вЂ” Tests, PRs y Jules

# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Corre todos los dГ­as a las 23:00 UY (02:00 UTC)
# TambiГ©n se puede disparar manualmente desde Actions
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC = 23:00 Uruguay (UTC-3)
  workflow_dispatch:        # Disparo manual desde GitHub Actions UI

jobs:

  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # JOB 1: Correr tests y reportar resultados
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  run-tests:
    name: рџ§Є Tests diarios
    runs-on: ubuntu-latest

    outputs:
      test_status: ${{ steps.test-run.outputs.status }}
      test_summary: ${{ steps.test-run.outputs.summary }}
      coverage:     ${{ steps.test-run.outputs.coverage }}

    steps:
      - name: Checkout del cГіdigo (rama dev)
        uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10          # Coincidir con versiГіn local

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Correr tests con cobertura
        id: test-run
        run: |
          # Correr tests
          set +e
          pnpm test --reporter=verbose --coverage > test-output.txt 2>&1
          EXIT_CODE=$?
          set -e
          
          # IMPRIMIR LOS LOGS PARA PODER VER EL ERROR REAL EN GITHUB
          echo "======================================"
          echo "LOGS DE VITEST (SALIDA COMPLETA):"
          echo "======================================"
          cat test-output.txt
          echo "======================================"

          if [ $EXIT_CODE -eq 0 ]; then
            echo "status=вњ… Tests OK" >> $GITHUB_OUTPUT
          else
            echo "status=вќЊ Tests fallando" >> $GITHUB_OUTPUT
          fi

          COVERAGE=$(grep -E "\s*All files" test-output.txt | awk '{print $4}' || echo "N/A")
          echo "coverage=${COVERAGE}%" >> $GITHUB_OUTPUT

          # Resumen compacto (Гєltimas 20 lГ­neas)
          SUMMARY=$(tail -20 test-output.txt | tr '\n' '|')
          echo "summary=${SUMMARY}" >> $GITHUB_OUTPUT

          # Subir output completo como artefacto
          exit $EXIT_CODE

      - name: Subir reporte de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.run_id }}
          path: test-output.txt
          retention-days: 7

  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # JOB 2: Revisar PRs abiertos y comentar
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  review-prs:
    name: рџ”Ќ RevisiГіn de PRs abiertos
    runs-on: ubuntu-latest
    needs: run-tests
    if: always()

    outputs:
      pr_count:   ${{ steps.check-prs.outputs.pr_count }}
      pr_summary: ${{ steps.check-prs.outputs.pr_summary }}

    steps:
      - name: Listar PRs abiertos hacia dev
        id: check-prs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Obtener PRs abiertos hacia dev
          PRS=$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --base dev \
            --state open \
            --json number,title,author,createdAt,reviewDecision \
            --limit 20)

          PR_COUNT=$(echo "$PRS" | jq length)
          echo "pr_count=${PR_COUNT}" >> $GITHUB_OUTPUT

          # Construir resumen de PRs
          if [ "$PR_COUNT" -eq 0 ]; then
            echo "pr_summary=Sin PRs abiertos hacia dev." >> $GITHUB_OUTPUT
          else
            SUMMARY=$(echo "$PRS" | jq -r '.[] | "PR #\(.number): \(.title) вЂ” @\(.author.login)"' | head -10 | tr '\n' '|')
            echo "pr_summary=${SUMMARY}" >> $GITHUB_OUTPUT
          fi

      - name: Comentar en PRs sin actividad en +3 dГ­as
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # PRs abiertos hace mГЎs de 3 dГ­as sin review
          STALE_DATE=$(date -d '3 days ago' --iso-8601)

          gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --base dev \
            --state open \
            --json number,createdAt,reviewDecision \
            --limit 20 | \
          jq -r --arg date "$STALE_DATE" \
            '.[] | select(.createdAt < $date and .reviewDecision == null) | .number' | \
          while read -r PR_NUMBER; do
            gh pr comment "$PR_NUMBER" \
              --repo "$GITHUB_REPOSITORY" \
              --body "вЏ° **Recordatorio automГЎtico:** Este PR lleva mГЎs de 3 dГ­as sin revisiГіn. ВїNecesita atenciГіn o puede ser asignado a Jules?" \
              2>/dev/null || true   # No fallar si ya se comentГі hoy
          done

  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # JOB 3: Asignar tareas a Jules
  # Crea un issue con tareas pendientes para que Jules las tome
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  assign-jules:
    name: рџ¤– Tareas para Jules
    runs-on: ubuntu-latest
    needs: [run-tests, review-prs]
    if: always()

    steps:
      - name: Checkout del cГіdigo
        uses: actions/checkout@v4

      - name: Buscar TODOs y FIXMEs en el cГіdigo
        id: find-todos
        run: |
          # Buscar TODOs y FIXMEs (excluye node_modules y .git)
          TODOS=$(grep -rn "TODO\|FIXME\|HACK\|XXX" \
            --include="*.ts" --include="*.tsx" --include="*.js" \
            --exclude-dir=node_modules --exclude-dir=.git \
            . 2>/dev/null | head -15 || echo "")

          if [ -z "$TODOS" ]; then
            echo "has_todos=false" >> $GITHUB_OUTPUT
          else
            echo "has_todos=true" >> $GITHUB_OUTPUT
            # Guardar en archivo para el siguiente paso
            echo "$TODOS" > todos.txt
          fi

      - name: Crear issue de tareas para Jules
        if: steps.find-todos.outputs.has_todos == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date '+%d/%m/%Y')
          TODOS_CONTENT=$(cat todos.txt | head -15)

          # Verificar si ya existe un issue de Jules para hoy
          EXISTING=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --label "jules-task" \
            --state open \
            --search "Daily Jules ${TODAY}" \
            --json number | jq length)

          if [ "$EXISTING" -eq 0 ]; then
            gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "рџ¤– Daily Jules ${TODAY} вЂ” Tareas automГЎticas" \
              --label "jules-task" \
              --body "## Tareas detectadas automГЎticamente

          ### рџ”§ TODOs y FIXMEs encontrados en el cГіdigo
          \`\`\`
          ${TODOS_CONTENT}
          \`\`\`

          ### рџ“‹ Estado de tests
          ${{ needs.run-tests.outputs.test_status }} | Cobertura: ${{ needs.run-tests.outputs.coverage }}

          ### рџ“Њ PRs abiertos: ${{ needs.review-prs.outputs.pr_count }}

          ---
          *Issue generado automГЎticamente por daily-review.yml В· ${TODAY}*
          *Jules: por favor revisГЎ estos items y creГЎ PRs hacia \`dev\` con las correcciones.*"
          fi

  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # JOB 4: NotificaciГіn resumen (Slack o email)
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  notify:
    name: рџ“Ј NotificaciГіn diaria
    runs-on: ubuntu-latest
    needs: [run-tests, review-prs, assign-jules]
    if: always()

    steps:
      - name: Enviar resumen a Slack
        # REQUISITO: Agregar SLACK_WEBHOOK_URL en Settings в†’ Secrets and variables в†’ Actions
        # Si no usГЎs Slack, eliminГЎ este paso
        if: ${{ vars.SLACK_ENABLED == 'true' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          TODAY=$(date '+%d/%m/%Y')

          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            --data "{
              \"text\": \"*рџ“Љ Daily Review вЂ” CoreOps ${TODAY}*\",
              \"blocks\": [
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*рџ“Љ Daily Review вЂ” ${TODAY}*\n${{ needs.run-tests.outputs.test_status }}\nрџ“Ѓ PRs abiertos: ${{ needs.review-prs.outputs.pr_count }}\nрџ”— <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Ver reporte completo>\"
                  }
                }
              ]
            }"

      - name: Enviar resumen por email (GitHub nativo)
        # GitHub ya envГ­a notificaciones al dueГ±o del repo cuando un workflow falla.
        # Este paso crea un summary visible en la UI de Actions para revisiГіn rГЎpida.
        run: |
          TODAY=$(date '+%d/%m/%Y')
          cat >> $GITHUB_STEP_SUMMARY << EOF
          # рџ“Љ Daily Review вЂ” ${TODAY}

          ## рџ§Є Tests
          **Estado:** ${{ needs.run-tests.outputs.test_status }}
          **Cobertura:** ${{ needs.run-tests.outputs.coverage }}

          ## рџ”Ќ PRs abiertos hacia \`dev\`
          **Cantidad:** ${{ needs.review-prs.outputs.pr_count }}

          ## рџ¤– Jules
          Issue de tareas creado automГЎticamente si se encontraron TODOs.

          ---
          [Ver reporte completo de tests](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF
