name: Fix pnpm lockfile conflicts

on:
  pull_request:
    branches: [main, dev]
    paths:
      - 'pnpm-lock.yaml'

jobs:
  fix-lockfile:
    name: 🔧 Regenerar pnpm-lock.yaml
    runs-on: ubuntu-latest

    # Solo actuar si hay conflictos reales en el lockfile
    steps:
      - name: Checkout de la rama del PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar pnpm
        run: npm install -g pnpm

      - name: Configurar identidad de git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Detectar conflictos en lockfile
        id: check-conflicts
        run: |
          if grep -q "<<<<<<< " pnpm-lock.yaml; then
            echo "has_conflicts=true" >> $GITHUB_OUTPUT
            echo "⚠️ Conflictos detectados en pnpm-lock.yaml — regenerando..."
          else
            echo "has_conflicts=false" >> $GITHUB_OUTPUT
            echo "✅ Sin conflictos en pnpm-lock.yaml"
          fi

      - name: Regenerar lockfile automáticamente
        if: steps.check-conflicts.outputs.has_conflicts == 'true'
        run: |
          # Eliminar el lockfile con conflictos
          rm pnpm-lock.yaml

          # Regenerar limpio
          pnpm install --no-frozen-lockfile

          # Commit y push del lockfile regenerado
          git add pnpm-lock.yaml
          git commit -m "fix: regenerar pnpm-lock.yaml para resolver conflictos de merge [skip ci]"
          git push

      - name: Confirmar resultado
        run: |
          if [ "${{ steps.check-conflicts.outputs.has_conflicts }}" == "true" ]; then
            echo "✅ pnpm-lock.yaml regenerado exitosamente"
          else
            echo "✅ No se necesitaron cambios"
          fi
